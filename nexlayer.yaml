application:
  name: soft-eagle-music-playlist-app
  pods:
    - name: backend
      image: "# filled by pipeline:backend"
      path: /api
      servicePorts:
        - 3000
      vars:
        CORS_ORIGIN: "http://localhost:3000"
        DATABASE_URL: "postgresql://app:${POSTGRES_PASSWORD}@postgres.pod:5432/app"
        JWT_ACCESS_EXPIRES: "15m"
        JWT_ACCESS_SECRET: "dev_access_secret_change_me"
        JWT_REFRESH_EXPIRES: "7d"
        JWT_REFRESH_SECRET: "dev_refresh_secret_change_me"
        NODE_ENV: "development"
        PORT: "4000"
        REDIS_URL: "redis://redis.pod:6379"
        SEED_ON_START: "false"
    - name: frontend
      image: "# filled by pipeline:frontend"
      path: /
      servicePorts:
        - 3000
      vars:
        API_URL: "http://backend.pod:3000"
        NEXT_PUBLIC_API_URL: "http://backend.pod:3000"
        VITE_API_URL: "http://backend.pod:3000"
    - name: postgres
      image: mirror.gcr.io/library/postgres:16-alpine
      servicePorts:
        - 5432
      vars: {}
    - name: redis
      image: mirror.gcr.io/library/redis:7-alpine
      servicePorts:
        - 6379
      vars: {}
